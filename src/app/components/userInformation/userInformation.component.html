<p-toast class="custom-toast" position="bottom-right"/>
<div class="flex flex-column align-items-center px-6 my-4">
    <div class="border-circle boder-1 border-solid w-12rem h-12rem mb-4 border-primary flex justify-content-center align-items-center overflow-hidden">
        <img [src]="personalInformation?.image ?? 'assets/images/avatar_image.png'" class="w-full">
    </div>
    <strong class="text-xl">{{personalInformation?.fullName}}</strong>
    <div class="text-sm" style="color: var(--secondary-color);">{{personalInformation?.shortDescription}}</div>
    <div class="flex flew-wrap gap-2 mt-2 mb-3">
        <p-button icon="pi pi-envelope" [rounded]="true" [text]="true" class="contact-button"
            (click)="copyToClipboard(personalInformation?.email!, 'contact email')" pTooltip="{{personalInformation?.email}}" tooltipPosition="bottom"></p-button>
        <p-button icon="pi pi-phone" [rounded]="true" [text]="true" class="contact-button"
            (click)="copyToClipboard(personalInformation?.phone!, 'phone number')" pTooltip="{{personalInformation?.phone}}" tooltipPosition="bottom"></p-button>
    </div>
    <strong>About me</strong>
    <div class="text-sm text-justify my-2">{{personalInformation?.profileSummary}}</div>
    <strong>Skills</strong>
    <skill-tags class="my-2" style="padding-top: 0.2rem;" [tags]="skillChips"></skill-tags>
</div>
