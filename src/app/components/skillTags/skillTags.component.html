<div [class]="reverse ? 'flex flex-wrap gap-2 flex-row-reverse' : 'flex flex-wrap gap-2'">
    <ng-content *ngFor="let tag of tags">
        <p-tag *ngIf="tag.variant != 'bok'" [class]="tag.variant == 'secondary' ? 'secondary-tag' : 'primary-tag'" [rounded]="true">{{tag.label}}</p-tag>
        <div [pTooltip]="(getBoKTooltip(tag.label) | async) ?? undefined" tooltipPosition="top" [tooltipStyleClass]="(getTooltipClass(tag.label) | async) ?? undefined">
            <p-tag *ngIf="tag.variant == 'bok'" class="bok-tag" [style.backgroundColor]="getBokColor(tag.label) | async" [rounded]="true" (click)="onClickConcept(tag.label)">
                {{tag.label}}
            </p-tag>
        </div>
    </ng-content>
</div>
