<p-dialog header="Upload Curriculum Vitae" [modal]="true" [(visible)]="visible" (onHide)="visibleChange.emit(false)">
    <div class="flex flex-column flex-1 gap-4 my-2">
        <p-fileupload mode="basic" chooseLabel="Upload File" chooseIcon="pi pi-upload" 
                        accept="application/pdf" (onSelect)="onFileSelected($event)" 
                        styleClass="justify-content-start custom-button"></p-fileupload>
        <div *ngIf="showProgressBar">
            <p-progressbar [value]="progress" class="custom-progress-bar"/>
        </div>
        <div *ngIf="!showProgressBar && progress == 100">
            <p-button class="custom-button" label="Apply" (click)="userPortfolioChange.emit(this.userPortfolio)"></p-button>
        </div>
    </div>
</p-dialog>
